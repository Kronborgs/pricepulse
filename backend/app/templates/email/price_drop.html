<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Prisfald</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#f4f6f8;padding:0">
  <!-- Header -->
  <div style="background:#0f172a;border-radius:8px 8px 0 0;padding:20px 28px;">
    <span style="font-family:sans-serif;font-size:22px;font-weight:bold;color:#29ABE2">Price</span><span style="font-family:sans-serif;font-size:22px;font-weight:bold;color:#8DC63F">Pulse</span>
  </div>
  <!-- Body -->
  <div style="background:#fff;padding:28px;border-radius:0 0 8px 8px;color:#1a1a1a">
    <h1 style="color:#8DC63F;margin-top:0">Prisfald registreret</h1>
    <p style="font-size:1.1em"><strong>{{ watch_name }}</strong></p>
    <table style="border-collapse:collapse;margin:16px 0;width:100%">
      <tr style="background:#f8f8f8">
        <td style="padding:10px 14px;color:#666;border-radius:6px 0 0 0">Gammel pris</td>
        <td style="padding:10px 14px;text-decoration:line-through;color:#999">{{ old_price }} {{ currency }}</td>
      </tr>
      <tr>
        <td style="padding:10px 14px;color:#666">Ny pris</td>
        <td style="padding:10px 14px;color:#8DC63F;font-weight:bold;font-size:1.3em">{{ new_price }} {{ currency }}</td>
      </tr>
    </table>
    <p style="margin:24px 0">
      <a href="{{ watch_url }}"
         style="display:inline-block;background:#29ABE2;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:bold">
        Se produkt
      </a>
    </p>
    <hr style="border:none;border-top:1px solid #eee;margin:24px 0" />
    <p style="color:#999;font-size:12px;margin:0">PricePulse — automatisk prisovervågning</p>
  </div>
</body>
</html>
