<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Nulstil kodeord</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#f4f6f8;padding:0">
  <!-- Header -->
  <div style="background:#0f172a;border-radius:8px 8px 0 0;padding:20px 28px;">
    <img src="{{ logo_url }}" alt="PricePulse" style="height:40px;display:block" />
  </div>
  <!-- Body -->
  <div style="background:#fff;padding:28px;border-radius:0 0 8px 8px;">
    <h1 style="color:#29ABE2;margin-top:0">Nulstil dit kodeord</h1>
    <p>Hej {{ display_name }},</p>
    <p>Klik på knappen nedenfor for at nulstille dit kodeord. Linket er gyldigt i 2 timer.</p>
    <p style="margin:24px 0">
      <a href="{{ reset_url }}"
         style="display:inline-block;background:#29ABE2;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:bold">
        Nulstil kodeord
      </a>
    </p>
    <p style="color:#666;font-size:13px">Hvis du ikke bad om dette, kan du ignorere denne email.</p>
    <p style="color:#aaa;font-size:12px;word-break:break-all">{{ reset_url }}</p>
    <hr style="border:none;border-top:1px solid #eee;margin:24px 0" />
    <p style="color:#999;font-size:12px;margin:0">PricePulse — automatisk prisovervågning</p>
  </div>
</body>
</html>
