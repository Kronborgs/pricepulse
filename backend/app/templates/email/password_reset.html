<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Nulstil kodeord</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:24px;color:#1a1a1a">
  <h1 style="color:#29ABE2">Nulstil dit kodeord</h1>
  <p>Hej {{ display_name }},</p>
  <p>Klik på knappen nedenfor for at nulstille dit kodeord. Linket er gyldigt i 2 timer.</p>
  <p>
    <a href="{{ reset_url }}"
       style="display:inline-block;background:#29ABE2;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:bold">
      Nulstil kodeord
    </a>
  </p>
  <p>Hvis du ikke bad om dette, kan du ignorere denne email.</p>
  <p style="color:#666;font-size:13px">{{ reset_url }}</p>
</body>
</html>
